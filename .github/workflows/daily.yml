name: Daily catalog audit

on:
  schedule:
    # 00:00 UTC daily = 03:00 Romania (summer DST) / 02:00 Romania (winter)
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: rotakt-web-daily
  cancel-in-progress: false

jobs:
  audit:
    # Self-hosted Windows runner on Cristian's PC.
    # Required because micromobilitate.ro blocks Azure cloud IPs (where GitHub-hosted runners live).
    runs-on: [self-hosted, Windows, X64, rotakt-pc]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run RotaktWeb agent
        run: python rotakt_web_agent.py

      - name: Publish report to job summary
        if: always()
        run: |
          $latest = Get-ChildItem -Path reports -Filter 'report_*.md' -ErrorAction SilentlyContinue |
                    Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($latest) {
            Get-Content $latest.FullName | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

      - name: Open daily issue if alerts present
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/open_alert_issue.py

      - name: Commit snapshots & report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "rotakt-web-bot"
          git config user.email "bot@rotakt.local"
          git add data/ reports/
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
          } else {
            $stamp = (Get-Date -Format 'yyyy-MM-dd')
            git commit -m "chore(daily): catalog snapshot $stamp"
            git push
          }

  deploy-pages:
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
