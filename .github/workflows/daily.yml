name: Daily catalog audit

on:
  schedule:
    # 06:30 UTC daily = 09:30 Romania (summer) / 08:30 Romania (winter)
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: rotakt-web-daily
  cancel-in-progress: false

jobs:
  audit:
    # Self-hosted Windows runner on Cristian's PC.
    # Required because micromobilitate.ro blocks Azure cloud IPs (where GitHub-hosted runners live).
    runs-on: [self-hosted, Windows, X64, rotakt-pc]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run RotaktWeb agent
        run: python rotakt_web_agent.py

      - name: Publish report to job summary
        if: always()
        run: |
          if ls reports/report_*.md 1> /dev/null 2>&1; then
            latest=$(ls -t reports/report_*.md | head -1)
            cat "$latest" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open daily issue if alerts present
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f data/alerts.json ]; then exit 0; fi
          python - <<'PY'
          import json, os, subprocess, sys
          a = json.load(open('data/alerts.json', encoding='utf-8'))
          total = a.get('total_alerts', 0)
          date = a.get('date')
          if total == 0:
              print("No alerts — skipping issue.")
              sys.exit(0)
          title = f"[{date}] RotaktWeb · {total} alerte de catalog"
          body_lines = [f"## Raport zilnic {date}", "", f"**Total alerte:** {total}", ""]
          for site, counts in a['sites'].items():
              body_lines.append(f"### {site}")
              body_lines.append("")
              for k, v in counts.items():
                  if v: body_lines.append(f"- **{k}**: {v}")
              body_lines.append("")
          body_lines.append("---")
          body_lines.append("Dashboard: https://willhurtlots.github.io/rotakt-web/")
          body = "\n".join(body_lines)
          # Search for existing issue with same title to avoid duplicates
          out = subprocess.run(
              ["gh", "issue", "list", "--state", "open", "--search", title, "--json", "number,title"],
              capture_output=True, text=True, check=True,
          ).stdout
          existing = [i for i in json.loads(out) if i["title"] == title]
          if existing:
              num = existing[0]["number"]
              subprocess.run(["gh", "issue", "comment", str(num), "--body", body], check=True)
              print(f"Updated existing issue #{num}")
          else:
              subprocess.run(
                  ["gh", "issue", "create", "--title", title, "--body", body],
                  check=True,
              )
              print("Created new issue.")
          PY

      - name: Commit snapshots & report
        run: |
          git config user.name "rotakt-web-bot"
          git config user.email "bot@rotakt.local"
          git add data/ reports/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(daily): catalog snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy-pages:
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
